server.port=9095
server.servlet.context-path=/api

# Database: H2 (default, zero-setup dev) — set spring.profiles.active=dev to use PostgreSQL
spring.datasource.url=jdbc:h2:mem:price_comparison;DB_CLOSE_DELAY=-1;NON_KEYWORDS=VALUE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA — let Hibernate auto-detect dialect (do NOT hardcode H2Dialect; it breaks JSON)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# CORS
cors.allowed-origins=http://localhost:3000,http://localhost:5173,http://localhost:5174

# Scheduler
spring.task.scheduling.pool.size=5
scheduler.price-tracking-cron=0 0 */6 * * *

# Scraper (Jsoup layer)
scraper.user-agent=Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36
scraper.timeout=60000
scraper.retry-attempts=2

# Python Playwright Scraping Service
scraper-service.url=http://localhost:8081
scraper-service.timeout=60000
scraper-service.enabled=true

# SerpAPI (Google Shopping API)
serpapi.key=aea17c221bd86ebfd61b92b1b61e429a1ed17a5ef9faeb374776a89cdb6b3107
serpapi.url=https://serpapi.com/search.json

# AI (optional — set either key to enable LLM-powered recommendations)
anthropic.api.key=${ANTHROPIC_API_KEY:}
openai.api.key=${OPENAI_API_KEY:}

# Security (JWT) — set a long random secret in production
security.jwt.secret=${JWT_SECRET:change-me-to-a-long-random-string-change-me-to-a-long-random-string}
security.jwt.ttl-seconds=2592000
